[build-system]
build-backend = "setuptools.build_meta"
requires = [
  "setuptools>=77",
  "setuptools-scm>=8.1",
  "wheel>=0.43",
]

[project]
name = "plasmapy"
description = "Python package for plasma science"
readme = "README.md"
keywords = [
  "astronomy",
  "fusion",
  "heliophysics",
  "plasma",
  "plasma physics",
  "science",
  "solar physics",
  "space plasmas",
]
license-files = [ "LICENSE.md" ]
# SPEC 0 recommends that projects drop support for Python versions 3
# years after their initial release. See:
# https://scientific-python.org/specs/spec-0000
requires-python = ">=3.12"
# Add classifiers from https://pypi.org/classifiers
classifiers = [
  "Intended Audience :: Education",
  "Intended Audience :: Science/Research",
  "Natural Language :: English",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Topic :: Scientific/Engineering :: Astronomy",
  "Topic :: Scientific/Engineering :: Physics",
]
dynamic = [ "version" ]
# SPEC 0 recommends that support for core packages should be dropped 2
# years after their initial release.
# Upper limits on package versions should be temporary because they can
# make it harder to resolve environments when PlasmaPy is installed
# alongside other packages, such as in the heliopythoniverse.
# When updating dependencies, run `nox -s lock` to upgrade the
# pinned environments in `uv.lock`.
dependencies = [
  "astropy>=6.1.3,<8",
  "h5py>=3.11",
  "lmfit>=1.3",
  "matplotlib>=3.8",
  "mpmath>=1.3",
  "numpy>=1.26",
  "packaging>=24",
  "pandas>=2.1.4",
  "pytest==9.0.3",
  "requests>=2.30",
  "scipy>=1.11",
  "tqdm>=4.65",
  "wrapt>=1.15",
  "xarray>=2024.5",
]
urls.Changelog = "https://docs.plasmapy.org/en/stable/whatsnew/index.html"
urls.Chat = "https://plasmapy.org/chat"
urls.Documentation = "https://docs.plasmapy.org/"
urls.Issues = "https://github.com/PlasmaPy/plasmapy/issues/"
urls.Source = "https://github.com/PlasmaPy/plasmapy"
urls.website = "https://www.plasmapy.org"
# Remove references to plasma calculator after mid-2026
scripts.plasma-calculator = "plasmapy.utils.calculator:main"

[dependency-groups]
# Define development dependencies using dependency groups (see PEP 735).
# Because dependency groups are excluded from built distributions of
# packages, SPEC 0 does not apply.
dev = [
  { include-group = "autotyping" },
  { include-group = "changelog" },
  { include-group = "docs" },
  { include-group = "lint" },
  { include-group = "manifest" },
  { include-group = "nox" },
  { include-group = "test" },
  { include-group = "type_check" },
  { include-group = "zizmor" },
]
test = [
  "hypothesis>=6.150",
  "pytest>=9.0.2",
  "pytest-cov>=7",
  "pytest-filter-subpackage>=0.2",
  "pytest-regressions>=2.9.1",
  "pytest-rerunfailures>=16.1",
  "pytest-xdist>=3.8",
]
docs = [
  "docutils>=0.22",
  "ipykernel>=7.2",
  "ipywidgets>=8.1.8",
  "jinja2>=3.1.6",
  "nbsphinx>=0.9.8",
  "numpydoc>=1.10",
  "pillow>=12.2",
  "plasmapy-sphinx>=2026.1",
  "pygments>=2.20",
  "sphinx>=9.1",
  "sphinx-changelog>=1.6",
  "sphinx-codeautolink>=0.18.1",
  "sphinx-copybutton>=0.5.2",
  "sphinx-gallery>=0.21",
  "sphinx-issues>=6",
  "sphinx-notfound-page>=1.1",
  "sphinx-reredirects>=1.1",
  "sphinx-rtd-theme>=3.1",
  "sphinx-tabs>=3.5",
  "sphinx-toolbox>=4.2",
  "sphinxcontrib-bibtex>=2.7",
  "sphinxcontrib-globalsubs>=1.1",
  "sphinxemoji>=0.3.2",
  "unidecode>=1.4",
  { include-group = "changelog" },
]
autotyping = [
  "autotyping>=24.9",
  "typing-extensions>=4.15",
]
changelog = [
  "towncrier>=24.8",
]
lint = [
  "pre-commit>=4.5.1",
  # Include ruff to make it available for IDEs in virtual environments
  "ruff>=0.14.11",
]
manifest = [
  "check-manifest>=0.51",
]
nox = [
  "nox>=2026.4.10",
  "nox-uv>=0.7",
]
type_check = [
  "ty>=0.0.35",
  { include-group = "docs" },
  { include-group = "test" },
]
zizmor = [
  "zizmor==1.22",
]

[tool.setuptools]
packages.find.where = [ "src" ]
packages.find.exclude = [ "docs/automodapi", "src/plasmapy/_dev" ]
packages.find.namespaces = false
include-package-data = true
package-data."plasmapy.particles.data" = [ "*" ]
package-data."plasmapy.tests" = [ "coveragerc" ]

[tool.setuptools_scm]
write_to = "src/plasmapy/_version.py"

[tool.uv]
# Prefer pre-built distributions when using lowest-direct resolution strategy or when using nightly wheels
no-build-package = [ "astropy", "h5py", "matplotlib", "numpy", "pandas", "scipy", "wrapt" ]
# Use a dependency cooldown so that security vulnerabilities in upstream
# packages can be identified and yanked before we start using them.
exclude-newer = "3 days"
exclude-newer-package = { plasmapy-sphinx = false }

[tool.ruff]
target-version = "py312"
namespace-packages = [ ".github/workflows", "docs" ]
extend-exclude = [
  ".hypothesis",
  ".idea",
  ".jupyter",
  "__pycache__",
  "_dev",
]
show-fixes = true
output-format = "grouped"
format.line-ending = "lf"
format.docstring-code-format = true
