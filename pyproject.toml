# Allow potentially ambiguous Unicode characters with valid uses in plasma science
lint.allowed-confusables = [
  "×",
  "–",
  "′",
  "∨",
  "∪",
  "∼",
  "⊤",
  "α",
  "ℂ",
  "ℰ",
  "ℱ",
  "γ",
  "ℎ",
  "ι",
  "ℐ",
  "ℑ",
  "ℒ",
  "ℓ",
  "ℳ",
  "ν",
  "ℕ",
  "ο",
  "𝒪",
  "ℚ",
  "ρ",
  "ℜ",
  "ℝ",
  "σ",
  "τ",
  "β",
  "υ",
  "ℤ",
]
lint.dummy-variable-rgx = "^(Z|mass_numb|request|event|_.*)$"
lint.flake8-annotations.allow-star-arg-any = true
lint.flake8-annotations.ignore-fully-untyped = true
lint.flake8-annotations.suppress-dummy-args = true
lint.flake8-annotations.suppress-none-returning = true
lint.flake8-import-conventions.aliases."astropy.constants" = "const"
lint.flake8-import-conventions.aliases."astropy.units" = "u"
lint.flake8-import-conventions.aliases."matplotlib.pyplot" = "plt"
lint.flake8-import-conventions.aliases.matplotlib = "mpl"
lint.flake8-import-conventions.aliases.numpy = "np"
lint.flake8-import-conventions.aliases.pandas = "pd"
lint.flake8-import-conventions.banned-from = [
  "astropy.units",
  "matplotlib.pyplot",
  "numpy",
  "pytest",
  "warnings",
]
lint.flake8-tidy-imports.ban-relative-imports = "all"
lint.flake8-tidy-imports.banned-api."typing.Callable".msg = "Deprecated alias. Change to collections.abc.Callable"
lint.flake8-tidy-imports.banned-api."typing.Collection".msg = "Deprecated alias. Change to collections.abc.Collection"
lint.flake8-tidy-imports.banned-api."typing.DefaultDict".msg = "Deprecated alias. Change to collections.defaultdict"
lint.flake8-tidy-imports.banned-api."typing.Dict".msg = "Deprecated alias. Change to dict"
lint.flake8-tidy-imports.banned-api."typing.Generator".msg = "Deprecated alias. Change to collections.abc.Generator"
lint.flake8-tidy-imports.banned-api."typing.Iterable".msg = "Deprecated alias. Change to collections.abc.Iterable"
lint.flake8-tidy-imports.banned-api."typing.Iterator".msg = "Deprecated alias. Change to collections.abc.Iterator"
lint.flake8-tidy-imports.banned-api."typing.List".msg = "Deprecated alias. Change to list"
lint.flake8-tidy-imports.banned-api."typing.Mapping".msg = "Deprecated alias. Change to collections.abc.mapping"
lint.flake8-tidy-imports.banned-api."typing.MutableMapping".msg = "Deprecated alias. Change to collections.abc.MutableMapping"
lint.flake8-tidy-imports.banned-api."typing.Sequence".msg = "Deprecated alias. Change to collections.abc.Sequence"
lint.flake8-tidy-imports.banned-api."typing.Set".msg = "Deprecated alias. Change to set"
lint.flake8-tidy-imports.banned-api."typing.Tuple".msg = "Deprecated alias. Change to tuple"
lint.flake8-tidy-imports.banned-api."typing.Type".msg = "Deprecated alias. Change to type"
lint.flake8-unused-arguments.ignore-variadic-names = true
lint.isort.known-first-party = [ "plasmapy" ]
lint.mccabe.max-complexity = 10
lint.pydocstyle.convention = "numpy"

[tool.codespell]
# Add false positives found by codespell to ignore-words-list
ignore-words-list = """
aas,
aci,
afe,
anc,
ans,
ba,
bale,
bu,
circularly,
ded,
dne,
ect,
explin,
fo,
fof,
gud,
hax,
hist,
hve,
ine,
inpt,
nd,
noo,
nwo,
ot,
recuse,
ro,
te,
tru,
ue,
ue,
windo"""
skip = "*.png,*cache*,*egg*,.git,.hypothesis,.idea,.nox,.tox,_build,*charged_particle*.ipynb,venv"

[tool.check-manifest]
ignore = [
  "#*",
  "*#",
  "*~",
  "*checkpoint*",
  "*TEMP*",
  ".mailmap",
  "docs/*build/**",
  "src/plasmapy/_version.py",
  "Untitled*",
]

[tool.ty]
# Ignore ty errors in certain notebooks until these can be fixed later
src.exclude = [
  "docs/notebooks/analysis/fit_functions.ipynb",
  "docs/notebooks/analysis/nullpoint.ipynb",
  "docs/notebooks/analysis/swept_langmuir/find_floating_potential.ipynb",
  "docs/notebooks/diagnostics/charged_particle_radiography_film_stacks.ipynb",
  "docs/notebooks/diagnostics/charged_particle_radiography_particle_tracing.ipynb",
  "docs/notebooks/diagnostics/charged_particle_radiography_particle_tracing_custom_source.ipynb",
  "docs/notebooks/diagnostics/charged_particle_radiography_particle_tracing_wire_mesh.ipynb",
  "docs/notebooks/diagnostics/thomson.ipynb",
  "docs/notebooks/dispersion/dispersion_function.ipynb",
  "docs/notebooks/dispersion/two_fluid_dispersion.ipynb",
  "docs/notebooks/plasma/grids_cartesian.ipynb",
  "docs/notebooks/plasma/grids_nonuniform.ipynb",
]
environment.python-platform = "all"
# Because astropy.units.Quantity[u.kg] is not recognized
rules.invalid-type-form = "ignore"
# Because astropy.constants.m_p, etc. are not recognized
rules.unresolved-attribute = "ignore"
analysis.allowed-unresolved-imports = [ "astropy.constants.**" ]

[tool.pytest]  # https://docs.pytest.org/en/stable/reference/customize.html#pyproject-toml
addopts = [
  "--pyargs",
  "--durations=5",
  "--durations-min=0.4",
  "--tb=short",
  "--numprocesses=auto",
  "--dist=loadfile",
  "--keep-duplicates",
  "--ignore=src/plasmapy/_dev",
  "--ignore=src/plasmapy/version.py",
]
doctest_optionflags = [
  "NORMALIZE_WHITESPACE",
  "ELLIPSIS",
  "NUMBER",
  "IGNORE_EXCEPTION_DETAIL",
]
empty_parameter_set_mark = "fail_at_collect"
filterwarnings = [
  # To prevent the number of warnings issue during tests from ballooning,
  # treat warnings as errors unless otherwise specified. Please raise a
  # GitHub issue when ignoring a FutureWarning or DeprecationWarning,
  # and label it with "needed for release".
  "error",
  # ubiquitous warning in particle tracker (see issue #2514)
  "ignore:.*Quantities should go to zero at edges of grid.*:RuntimeWarning",
  # occasional warning from downloader tests
  "once:.*API rate limit exceeded.*:UserWarning",
  # for numpy.reshape calls, newshape kwarg is deprecated; use shape instead or pass positionally
  "once:.*MultiIndex.*:FutureWarning",
  # warnings that have occurred sporadically but probably aren't important
  "once:unclosed:ResourceWarning",
  "once::pytest.PytestUnraisableExceptionWarning",
  "once:XDG_CONFIG_HOME:astropy.utils.exceptions.AstropyUserWarning",
]
markers = [
  "slow: marks tests as slow (deselect with '-m \"not slow\"')",
]
strict = true
testpaths = [ "tests", "src/plasmapy" ]

[tool.coverage]
run.branch = true
run.omit = [
  "*/plasmapy/*version.py",
  "*/plasmapy/_dev/*",
  "*/plasmapy/tests/*",
]
run.source = [ "src" ]
report.exclude_lines = [
  "@abstractmethod",
  "coverage: ignore",
  "if TYPE_CHECKING",
  "if typing.TYPE_CHECKING",
  "ImportError",
  "ModuleNotFoundError",
  "raise NotImplementedError",
]

[tool.towncrier]
name = "PlasmaPy"
package = "plasmapy"
directory = "changelog"
filename = "CHANGELOG.rst"
title_format = "{name} v{version} ({project_date})"
# Despite the name mismatch, we use `issue_format` for linking to PRs
issue_format = ":pr:`{issue}`"
wrap = true
# Changes to changelog tags need to be propagated into .github/workflows/changelog.yml
type = [
  { directory = "feature", name = "New Features", showcontent = true },
  { directory = "doc", name = "Documentation Improvements", showcontent = true },
  { directory = "breaking", name = "Backwards Incompatible Changes", showcontent = true },
  { directory = "removal", name = "Deprecations and Planned Removals", showcontent = true },
  { directory = "bugfix", name = "Bug Fixes", showcontent = true },
  { directory = "internal", name = "Internal Changes and Refactorings", showcontent = true },
  { directory = "test", name = "Updates to Software Testing", showcontent = true },
  { directory = "misc", name = "Miscellaneous Changes", showcontent = true },
]

[tool.build_docs]
source-dir = "docs"
build-dir = "docs/_build"
all_files = "1"

[tool.changelog-bot]
towncrier_changelog.enabled = true
towncrier_changelog.verify_pr_number = true
towncrier_changelog.changelog_skip_label = "no changelog entry needed"
towncrier_changelog.changelog_noop_label = "skip changelog checks"
towncrier_changelog.whatsnew_label = "needs changelog entry"
towncrier_changelog.whatsnew_pattern = "changelog\\/\\d+\\.[a-zA-Z]+(\\.\\d+)?\\.rst"
