# Check that hyperlinks in the documentation are up-to-date.
#
# To check hyperlinks on a pull request, add the label entitled
# 'perform linkcheck in CI'. The workflow is defined in noxfile.py.

name: Docs

on:
  schedule:
  - cron: 37 7 * * 2
  workflow_dispatch:
  pull_request:
    types: [labeled, opened, synchronize, reopened]
    branches:
    - main

permissions: {}

jobs:

  linkcheck:
    name: Check hyperlinks (allowed failure)
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'perform linkcheck in CI')) ||
      (github.event_name == 'schedule' && github.repository == 'PlasmaPy/PlasmaPy' && github.ref == 'refs/heads/main')

    steps:

    - name: Checkout code
      uses: actions/checkout@v6
      with:
        persist-credentials: false

    - name: Install graphviz and pandoc for doc builds
      uses: mamba-org/setup-micromamba@v2
      with:
        create-args: graphviz pandoc -c conda-forge
        init-shell: bash powershell
        cache-environment: true
        environment-name: micromamba-env
        post-cleanup: all

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        python-version: 3.14

    - name: Check hyperlinks in documentation
      shell: bash -el {0}
      run: uv run noxfile.py -s linkcheck
