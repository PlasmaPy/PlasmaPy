# Create a pull request to upgrade the lockfile that defines the Python
# environments used in most continuous integration checks.
#
# For more details, see: .github/content/upgrade-uv-lock-pr-body.md

name: Upgrade uv.lock

on:
  schedule:
  - cron: 37 11 * * 1
  workflow_dispatch:

jobs:
  upgrade-requirements:
    name: Upgrade uv.lock
    runs-on: ubuntu-latest
    if: github.repository == 'PlasmaPy/PlasmaPy'

    steps:

    - name: Checkout code
      uses: actions/checkout@v7.0.0
      with:
        persist-credentials: false

    - name: Install uv
      uses: astral-sh/setup-uv@v8.2.0
      with:
        enable-cache: true

    - name: Run Nox session to upgrade uv.lock
      run: uvx nox --session lock

    - name: Add ignore flags for ty (continue on failure)
      run: uvx nox --session ty -- --add-ignore
      continue-on-error: true

    - name: Run pre-commit (continue on failure)
      run: uvx pre-commit run --all-files
      continue-on-error: true

    # When a pull request is created by a GitHub Action, normally the
    # checks will not be run. While the simplest workaround would have
    # been to open and close the PR, an alternative is to authenticate
    # with GitHub App generated tokens (as done below). The instructions
    # for how to do this are in the documentation for the
    # peter-evans/create-pull-request action.

    - name: Generate token
      uses: tibdex/github-app-token@3beb63f4bd073e61482598c45c71c1019b59b73a # v2.1.0
      id: generate_token
      with:
        app_id: ${{ secrets.APP_ID }}
        private_key: ${{ secrets.APP_PRIVATE_KEY }}

    - name: Create pull request
      uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
      with:
        title: Automatically upgrade locked Python environment used in CI
        commit-message: Upgrade uv.lock with 'nox --session lock'
        # The PR body message is generated dynamically via `nox --session lock` in CI
        body-path: .github/content/upgrade-uv-lock-pr-body.md
        labels: no changelog entry needed, requirements, run comprehensive tests
        branch: upgrade-uv-lock
        base: main
        delete-branch: true
        token: ${{ steps.generate_token.outputs.token }}
