name: PHEP 3 Compliance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run quarterly: Jan 1, Apr 1, Jul 1, Oct 1 at 3pm UTC (8am Mountain Time)
  - cron: 0 15 1 1,4,7,10 *
  workflow_dispatch:

permissions: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: Check PHEP 3 Compliance
      uses: heliophysicsPy/pyhc-actions/phep3-compliance@v1    # zizmor: ignore[unpinned-uses]
      with:
        ignore-errors-for: xarray
